<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="STEAM Passport">
<meta name="theme-color" content="#632B82">
<title>My STEAM Passport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#632B82;
    --navy-deep:#431C5A;
    --sky:#F4F1F7;
    --paper:#FFFFFF;
    --gold:#EC7D36;
    --brick:#B9232F;
    --ink:#3A2E45;
    --ink-soft:#6E5F7C;
    --outline:#D8CFE0;
    --radius-lg:26px;
    --radius-md:18px;
    --shadow: 0 6px 18px rgba(22,35,63,0.12);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  button, input, .bubble{ touch-action:manipulation; }
  body{ -webkit-user-select:none; user-select:none; overscroll-behavior:none; }
  input, textarea{ -webkit-user-select:text; user-select:text; }
  #app{ padding-top:calc(20px + env(safe-area-inset-top)); padding-bottom:calc(70px + env(safe-area-inset-bottom)); }
  html,body{margin:0;padding:0;}
  body{
    font-family:'Atkinson Hyperlegible', -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background:var(--sky);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{ font-family:'Fredoka', 'Arial Rounded MT Bold', -apple-system, sans-serif; font-weight:600; margin:0; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  button:focus-visible, input:focus-visible, a:focus-visible{ outline:3px solid var(--gold); outline-offset:3px; }
  #app{ max-width:900px; margin:0 auto; padding:20px 20px 70px; min-height:100vh; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; gap:10px; flex-wrap:wrap; }
  .backbtn{ display:flex; align-items:center; gap:8px; font-size:16px; font-weight:700; color:var(--navy);
    padding:10px 16px; border-radius:999px; background:var(--paper); box-shadow:var(--shadow); min-height:48px; }
  .backbtn:active{ transform:scale(0.97); }
  .staffbtn{ display:flex; align-items:center; gap:6px; font-size:13px; color:var(--ink-soft);
    padding:8px 14px; border-radius:999px; background:rgba(255,255,255,0.6); min-height:40px; }

  /* ---------- COVER ---------- */
  .cover{ min-height:calc(100vh - 40px); display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; background:linear-gradient(180deg, var(--navy) 0%, var(--navy-deep) 100%);
    border-radius:32px; color:#fff; padding:50px 24px; box-shadow:var(--shadow); }
  .cover .mascot{ width:150px; height:150px; margin-bottom:10px; }
  .logo{ display:block; margin:0 auto 18px; width:150px; height:auto; }
  .logo-light{ filter:brightness(0) invert(1); }
  .cert .logo{ width:130px; margin-bottom:10px; }
  .cover .eyebrow{ letter-spacing:2px; text-transform:uppercase; font-size:14px; font-weight:700; color:var(--gold); margin-bottom:8px; }
  .cover h1{ font-size:38px; line-height:1.15; margin-bottom:12px; }
  .cover p{ font-size:18px; color:#C9D3E8; max-width:420px; margin-bottom:28px; }
  .bigbtn{ background:#F6E758; color:var(--navy-deep); font-family:'Fredoka',sans-serif; font-weight:700; font-size:19px;
    padding:17px 36px; border-radius:999px; box-shadow:0 8px 0 #C4B428; min-height:58px; }
  .bigbtn:active{ transform:translateY(4px); box-shadow:0 4px 0 #C4B428; }
  .secondary-link{ margin-top:16px; color:#C9D3E8; font-size:15px; text-decoration:underline; font-weight:700; }

  /* ---------- MEET THE TEAM ---------- */
  .team-card{ background:var(--paper); border-radius:var(--radius-md); box-shadow:var(--shadow); padding:20px;
    display:flex; align-items:center; gap:16px; margin-bottom:14px; text-align:left; }
  .team-avatar{ width:60px; height:60px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:#fff; }
  .team-avatar svg{ width:32px;height:32px; }
  .team-fig{ width:64px; height:64px; border-radius:50%; flex-shrink:0; background:var(--sky); overflow:hidden; border:3px solid var(--outline); }
  .team-card p{ margin:0; font-size:16px; color:var(--ink); line-height:1.5; }
  .story-step{ background:var(--paper); border-radius:var(--radius-md); box-shadow:var(--shadow); padding:18px 20px;
    display:flex; align-items:center; gap:16px; margin-bottom:12px; }
  .story-num{ width:36px;height:36px;border-radius:50%; background:var(--navy); color:#fff; font-family:'Fredoka',sans-serif;
    font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:16px; }
  .story-step p{ margin:0; font-size:16px; line-height:1.5; }

  /* ---------- GRID ---------- */
  .gridtitle{ margin-bottom:18px; }
  .gridtitle h2{ font-size:27px; color:var(--navy); }
  .gridtitle p{ color:var(--ink-soft); font-size:15px; margin-top:4px;}
  .studentgrid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px,1fr)); gap:16px; }
  .studenttile{ background:var(--paper); border-radius:var(--radius-md); padding:20px 14px; text-align:center;
    box-shadow:var(--shadow); min-height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px; }
  .studenttile:active{ transform:scale(0.97); }
  .avatar{ width:56px; height:56px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;
    font-family:'Fredoka',sans-serif; font-size:21px; font-weight:700; flex-shrink:0; }
  .studenttile .name{ font-weight:700; font-size:16px; color:var(--navy); }
  .studenttile .sub{ font-size:12px; color:var(--ink-soft); }
  .addtile{ border:2.5px dashed var(--outline); background:transparent; box-shadow:none; color:var(--ink-soft); }
  .addtile .plus{ width:44px;height:44px;border-radius:50%; background:var(--sky); display:flex;align-items:center;justify-content:center; color:var(--navy); }
  .addtile .plus svg{ width:22px;height:22px; }
  .empty-note{ text-align:center; padding:40px 20px; color:var(--ink-soft); }

  /* ---------- WELCOME INTERSTITIAL ---------- */
  .welcome-card{ background:linear-gradient(180deg, var(--navy), var(--navy-deep)); color:#fff; border-radius:var(--radius-lg);
    padding:44px 26px; text-align:center; box-shadow:var(--shadow); }
  .welcome-card .mascot{ width:120px; height:120px; margin-bottom:6px; }
  .welcome-card h2{ font-size:28px; margin-bottom:10px; }
  .welcome-card p{ font-size:16px; color:#C9D3E8; max-width:440px; margin:0 auto 8px; line-height:1.6; }
  .welcome-card .recap{ background:rgba(255,255,255,0.08); border-radius:14px; padding:14px 18px; margin:18px auto; max-width:460px; text-align:left; }
  .welcome-card .recap div{ font-size:14px; color:#C9D3E8; }
  .ready-scale{ margin:22px auto 8px; max-width:400px; }
  .scale-row{ display:flex; gap:10px; justify-content:center; }
  .scale-dot{ width:54px; height:54px; border-radius:50%; border:3px solid rgba(255,255,255,0.4);
    color:#fff; font-family:'Fredoka',sans-serif; font-weight:700; font-size:20px; display:flex; align-items:center; justify-content:center; }
  .scale-dot.scale-1{ background:rgba(185,35,47,0.55); }
  .scale-dot.scale-2{ background:rgba(201,97,31,0.55); }
  .scale-dot.scale-3{ background:rgba(246,231,88,0.35); }
  .scale-dot.scale-4{ background:rgba(31,124,114,0.55); }
  .scale-dot.scale-5{ background:rgba(41,72,154,0.6); }
  .scale-dot.selected{ border-color:#fff; transform:scale(1.12); box-shadow:0 0 0 3px rgba(255,255,255,0.3); }
  .scale-ends{ display:flex; justify-content:space-between; margin-top:8px; font-size:12px; color:#C9D3E8; padding:0 4px; }
  .scale-label{ margin-top:12px; font-size:14px; color:#fff; font-weight:700; min-height:20px; }
  .readycheck-options{ display:flex; flex-direction:column; gap:14px; margin:22px auto 0; max-width:360px; }
  .ready-option{
    background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.25);
    border-radius:18px; padding:18px 20px; display:flex; align-items:center; gap:14px;
    color:#fff; font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px; text-align:left;
    min-height:60px;
  }
  .ready-option:active{ transform:scale(0.97); }
  .ro-icon{ width:38px;height:38px; border-radius:50%; background:rgba(255,255,255,0.15); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .ro-icon svg{ width:20px;height:20px; }
  .breathe-circle{
    width:100px; height:100px; border-radius:50%; margin:0 auto 20px;
    background:radial-gradient(circle, #F6E758, #E3A82F);
    animation:breathe 4s ease-in-out infinite;
  }
  @keyframes breathe{ 0%,100%{ transform:scale(0.85); opacity:0.85; } 50%{ transform:scale(1.15); opacity:1; } }
  @media (prefers-reduced-motion: reduce){ .breathe-circle{ animation:none; } }

  /* ---------- PASSPORT HOME ---------- */
  .passport-header{ background:var(--navy); color:#fff; border-radius:var(--radius-lg); padding:24px 24px; margin-bottom:22px;
    display:flex; align-items:center; gap:16px; box-shadow:var(--shadow); }
  .passport-header .avatar{ width:60px; height:60px; font-size:24px; flex-shrink:0; }
  .passport-header h2{ font-size:24px; }
  .passport-header .sub{ color:#B9C6E0; font-size:14px; margin-top:2px; }
  .section-label{ font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--ink-soft); margin:24px 0 12px; }
  .strandlist{ display:flex; flex-direction:column; gap:14px; }
  .strandcard{ background:var(--paper); border-radius:var(--radius-md); box-shadow:var(--shadow); padding:18px; display:flex;
    align-items:center; gap:16px; text-align:left; width:100%; min-height:76px; }
  .strandcard:active{ transform:scale(0.985); }
  .strand-icon{ width:52px;height:52px; border-radius:16px; display:flex;align-items:center;justify-content:center; color:#fff; flex-shrink:0; }
  .strand-icon svg{ width:27px; height:27px; }
  .strand-info{ flex:1; min-width:0; }
  .strand-info .sname{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:17px; color:var(--navy); }
  .strand-info .sstate{ font-size:13px; color:var(--ink-soft); margin-top:2px;}
  .stamp-dots{ display:flex; gap:5px; margin-top:6px; }
  .stamp-dot{ width:10px; height:10px; border-radius:50%; background:var(--outline); }
  .stamp-dot.done{ background:var(--current); }
  .stamp-dot.supported{ background:var(--gold); }
  .chevron{ color:var(--outline); flex-shrink:0; }
  .badge-complete{ font-size:11px; font-weight:700; color:#fff; background:var(--navy); padding:3px 9px; border-radius:999px; margin-left:6px; }
  .strength-pill{ display:inline-block; color:#fff; font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; margin-top:6px; }
  .add-tech-btn{ background:var(--paper); border:2px dashed var(--outline); border-radius:var(--radius-md); padding:18px; text-align:center;
    color:var(--navy); font-weight:700; font-family:'Fredoka',sans-serif; font-size:16px; min-height:64px; display:flex; align-items:center; justify-content:center; gap:10px; width:100%; }
  .add-tech-btn svg{ width:20px; height:20px; flex-shrink:0; }
  .empty-passport{ background:var(--paper); border-radius:var(--radius-md); box-shadow:var(--shadow); padding:26px; text-align:center; color:var(--ink-soft); }

  /* ---------- ADD TECH PICKER ---------- */
  .techpicker{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:14px; }
  .techtile{ background:var(--paper); border-radius:var(--radius-md); box-shadow:var(--shadow); padding:18px 12px; text-align:center; }
  .techtile:active{ transform:scale(0.96); }
  .techtile .strand-icon{ margin:0 auto 10px; }
  .techtile .tname{ font-weight:700; color:var(--navy); font-size:15px; }

  /* ---------- STRAND DETAIL ---------- */
  .strand-header{ border-radius:var(--radius-lg); padding:26px 22px; color:#fff; margin-bottom:18px; box-shadow:var(--shadow); }
  .strand-header .strand-icon{ width:60px; height:60px; background:rgba(255,255,255,0.22); border-radius:20px; margin-bottom:12px; }
  .strand-header .strand-icon svg{ width:32px;height:32px; }
  .strand-header h2{ font-size:26px; margin-bottom:6px; }
  .strand-header p{ font-size:15px; opacity:0.92; max-width:520px; }

  .howto{ display:flex; gap:10px; margin-bottom:22px; }
  .howto-step{ flex:1; background:var(--paper); border-radius:16px; box-shadow:var(--shadow); padding:14px 10px; text-align:center; }
  .howto-step .hticon{ width:44px;height:44px; margin:0 auto 8px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:3px solid var(--outline); }
  .howto-step .hticon svg{ width:20px;height:20px; }
  .howto-step.hs-supported .hticon{ border-color:var(--gold); color:var(--gold); background:#FDEEE1; }
  .howto-step.hs-done .hticon{ border-color:var(--navy); background:var(--navy); color:#fff; }
  .howto-step .htlabel{ font-size:12px; font-weight:700; color:var(--ink-soft); line-height:1.3; }
  .howto-arrow{ display:flex; align-items:center; color:var(--outline); }

  .indicator-list{ display:flex; flex-direction:column; gap:14px; margin-bottom:18px; }
  .indicator-card{ background:var(--paper); border-radius:var(--radius-md); box-shadow:var(--shadow); padding:16px 18px; display:flex;
    align-items:center; gap:16px; width:100%; text-align:left; min-height:88px; }
  .indicator-card:active{ transform:scale(0.985); }
  .stampcircle{ width:58px; height:58px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    border:3px solid var(--outline); color:var(--outline); transition:transform .18s ease; }
  .stampcircle svg{ width:26px; height:26px; }
  .stampcircle.supported{ border-color:var(--gold); color:var(--gold); background:#FDEEE1; }
  .stampcircle.done{ border-color:var(--current); background:var(--current); color:#fff; }
  .stampcircle.pop{ animation:pop .38s ease; }
  @keyframes pop{ 0%{transform:scale(1);} 45%{transform:scale(1.28) rotate(-6deg);} 100%{transform:scale(1) rotate(0);} }
  @media (prefers-reduced-motion: reduce){ .stampcircle.pop{ animation:none; } }
  .indicator-text{ flex:1; }
  .indicator-text .itext{ font-size:16px; font-weight:700; color:var(--navy); }
  .indicator-text .istate{ font-size:13px; margin-top:3px; color:var(--ink-soft); }
  .bonus-card{ background:#FBF3DC; border:2px dashed var(--gold); border-radius:var(--radius-md); padding:16px 18px; display:flex;
    align-items:center; gap:16px; width:100%; text-align:left; min-height:88px; }
  .starcircle{ width:58px;height:58px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
    background:#fff; color:var(--gold); border:3px solid var(--gold); }
  .starcircle.on{ background:var(--gold); color:#fff; }
  .starcircle svg{ width:26px;height:26px; }
  .strand-complete-note{ margin-top:16px; background:var(--navy); color:#fff; border-radius:var(--radius-md); padding:16px 20px;
    text-align:center; font-family:'Fredoka',sans-serif; font-weight:600; font-size:16px; }

  /* ---------- ACHIEVEMENTS ---------- */
  .cert{ background:var(--paper); border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:40px 28px; text-align:center;
    position:relative; overflow:hidden; border:6px solid var(--navy); }
  .cert .eyebrow{ letter-spacing:2px; text-transform:uppercase; font-size:12px; font-weight:700; color:var(--ink-soft); }
  .cert h2{ font-size:21px; color:var(--ink-soft); margin-top:6px; }
  .cert .studentname{ font-size:34px; color:var(--navy); margin:14px 0 20px; }
  .cert-strands{ display:flex; justify-content:center; gap:16px; flex-wrap:wrap; margin-bottom:22px; }
  .cert-strand{ display:flex; flex-direction:column; align-items:center; gap:8px; width:100px; }
  .cert-strand .strand-icon{ width:52px;height:52px; }
  .cert-strand .strand-icon svg{ width:26px;height:26px; }
  .cert-strand span{ font-size:12px; font-weight:700; color:var(--navy); }
  .cert-strength{ font-size:10px !important; font-weight:700; color:#fff !important; background:var(--gold); padding:2px 8px; border-radius:999px; }
  .stamp-seal{ position:absolute; top:30px; right:-32px; transform:rotate(18deg); border:5px solid var(--brick); color:var(--brick);
    font-family:'Fredoka',sans-serif; font-weight:700; font-size:14px; letter-spacing:1px; padding:9px 44px; border-radius:12px; opacity:0.9; }
  .cert p.tagline{ color:var(--ink-soft); font-size:14px; margin-bottom:8px; }
  .cert-actions{ display:flex; gap:12px; justify-content:center; margin-top:8px; flex-wrap:wrap; }
  @media print{ .topbar, .cert-actions, .noprint{ display:none !important; } body{ background:#fff; } .cert{ border-width:4px; } }

  /* ---------- FORMS / STAFF ---------- */
  .staffpanel{ background:var(--paper); border-radius:var(--radius-md); box-shadow:var(--shadow); padding:22px; }
  .field{ margin-bottom:18px; }
  .field label{ display:block; font-weight:700; color:var(--navy); margin-bottom:8px; font-size:14px;}
  .field .hint{ font-size:12px; color:var(--ink-soft); margin-top:5px; }
  .field input[type=text], .field input[type=password], .field textarea{ width:100%; padding:13px 15px; border-radius:12px;
    border:2px solid var(--outline); font-size:15px; font-family:inherit; }
  .field textarea{ resize:vertical; min-height:60px; }
  .warn{ background:#FFF3E0; border:2px solid var(--gold); border-radius:12px; padding:10px 14px; font-size:13px; color:#7A5416; margin-bottom:14px; }
  .swatches{ display:flex; gap:9px; flex-wrap:wrap; }
  .swatch{ width:38px;height:38px;border-radius:50%; border:3px solid transparent; }
  .swatch.selected{ border-color:var(--navy); }
  .iconpicker{ display:flex; gap:8px; flex-wrap:wrap; }
  .iconopt{ width:44px;height:44px;border-radius:12px; background:var(--sky); display:flex; align-items:center; justify-content:center;
    border:2px solid transparent; color:var(--navy); }
  .iconopt svg{ width:20px;height:20px; }
  .iconopt.selected{ border-color:var(--navy); background:#E4EEFB; }
  .primary-action{ background:var(--navy); color:#fff; font-weight:700; padding:14px 26px; border-radius:999px; font-size:15px; min-height:50px; }
  .ghost-action{ background:transparent; color:var(--brick); font-weight:700; font-size:13px; padding:10px; }
  .teachermenu{ display:flex; flex-direction:column; gap:12px; }
  .teachermenu button{ background:var(--paper); box-shadow:var(--shadow); border-radius:var(--radius-md); padding:20px; text-align:left;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:17px; color:var(--navy); display:flex; align-items:center; gap:14px; }
  .teachermenu .micon{ width:44px;height:44px; border-radius:12px; background:var(--sky); display:flex; align-items:center; justify-content:center; }
  .teachermenu .micon svg{ width:22px;height:22px; color:var(--navy); }
  .techrow{ display:flex; align-items:center; gap:14px; padding:14px; border-radius:14px; background:var(--sky); margin-bottom:10px; }
  .techrow .strand-icon{ width:42px;height:42px; border-radius:12px; }
  .techrow .strand-icon svg{ width:20px;height:20px; }
  .techrow .tname{ flex:1; font-weight:700; color:var(--navy); }
  .techrow.archived{ opacity:0.5; }
  .smallbtn{ font-size:12px; font-weight:700; color:var(--navy); background:#fff; padding:7px 12px; border-radius:999px; box-shadow:var(--shadow); }
  .smallbtn.danger{ color:var(--brick); }
  .row-actions{ display:flex; flex-direction:column; gap:8px; align-items:flex-end; flex-shrink:0; }
  .studentrow{ display:flex; align-items:flex-start; gap:14px; padding:14px; border-radius:14px; background:var(--sky); margin-bottom:10px; }
  .studentrow .name{ font-weight:700; color:var(--navy); font-size:15px; }
  .studentrow .meta{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .studentrow .techtags{ display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .tag{ font-size:11px; font-weight:700; padding:3px 9px; border-radius:999px; color:#fff; }
  .read-aloud-btn{
    position:fixed; right:16px; bottom:calc(16px + env(safe-area-inset-bottom));
    display:flex; align-items:center; gap:8px;
    background:var(--paper); color:var(--navy); border:2px solid var(--navy);
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:15px;
    padding:12px 18px; border-radius:999px; box-shadow:0 6px 18px rgba(22,35,63,0.2);
    z-index:1100; min-height:52px;
  }
  .read-aloud-btn svg{ width:22px; height:22px; }
  .read-aloud-btn.on{ background:var(--navy); color:#fff; }
  .read-aloud-btn.on svg{ animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }
  @media (prefers-reduced-motion: reduce){ .read-aloud-btn.on svg{ animation:none; } }
  .toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
    background:var(--navy); color:#fff; font-weight:400; font-size:14px;
    padding:14px 22px; border-radius:14px; box-shadow:0 8px 24px rgba(0,0,0,0.25);
    max-width:90%; text-align:center; z-index:999; cursor:pointer;
    border-left:5px solid var(--gold);
  }
  .celebrate-overlay{
    position:fixed; inset:0; background:rgba(14,24,48,0.92);
    display:flex; align-items:center; justify-content:center;
    z-index:1200; overflow:hidden;
  }
  .celebrate-card{
    background:var(--paper); border-radius:28px; padding:40px 32px;
    text-align:center; max-width:340px; box-shadow:0 20px 60px rgba(0,0,0,0.4);
    position:relative; z-index:2;
    animation:cardIn .3s ease;
  }
  @keyframes cardIn{ from{ transform:scale(0.85); opacity:0;} to{ transform:scale(1); opacity:1; } }
  .celebrate-card .medal{ width:76px; height:76px; margin:0 auto 14px; }
  .celebrate-card h2{ font-size:24px; color:var(--navy); margin-bottom:8px; }
  .celebrate-card p{ font-size:15px; color:var(--ink-soft); margin-bottom:20px; }
  .celebrate-card .bigbtn{ padding:14px 30px; font-size:16px; min-height:52px; }
  .strength-tag{
    display:inline-block; color:#fff; font-family:'Fredoka',sans-serif; font-weight:600; font-size:14px;
    padding:8px 18px; border-radius:999px; margin-bottom:18px;
  }
  .feeling-prompt{ margin-bottom:20px; }
  .fp-label{ font-size:13px; color:var(--ink-soft); font-weight:700; margin-bottom:10px; }
  .fp-row{ display:flex; justify-content:center; gap:12px; }
  .fp-option{
    width:52px; height:52px; border-radius:50%; border:2px solid var(--outline);
    color:var(--ink-soft); display:flex; align-items:center; justify-content:center;
  }
  .fp-option svg{ width:26px;height:26px; }
  .fp-option.selected{ border-color:var(--navy); background:var(--navy); color:#fff; }
  .photo-cta{
    display:flex; align-items:center; justify-content:center; gap:10px;
    width:100%; background:var(--sky); border:2px dashed var(--navy);
    color:var(--navy); font-family:'Fredoka',sans-serif; font-weight:600; font-size:15px;
    border-radius:16px; padding:14px 16px; margin-bottom:14px; min-height:54px;
  }
  .photo-cta svg{ width:22px; height:22px; }
  .photo-cta-page{ background:var(--paper); box-shadow:var(--shadow); border-style:solid; border-color:var(--outline); }
  .photo-card{ background:var(--paper); border-radius:var(--radius-md); box-shadow:var(--shadow); padding:12px; }
  .photo-card img{ width:100%; border-radius:12px; display:block; }
  .photo-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:10px; }
  .cert-photo{ width:76px; height:76px; object-fit:cover; border-radius:16px; border:3px solid var(--outline); }
  .brainbreak-row{ display:flex; gap:12px; }
  .brainbreak-btn{
    flex:1; background:var(--paper); border-radius:var(--radius-md); box-shadow:var(--shadow);
    padding:16px 12px; display:flex; flex-direction:column; align-items:center; gap:10px;
    font-family:'Fredoka',sans-serif; font-weight:600; font-size:14px; color:var(--navy); min-height:96px;
  }
  .brainbreak-btn:active{ transform:scale(0.96); }
  .bb-icon{ width:40px; height:40px; border-radius:50%; }
  .bb-breathe{ background:radial-gradient(circle, #F6E758, #E3A82F); animation:breathe 4s ease-in-out infinite; }
  .bb-bubbles{ display:flex; align-items:flex-end; gap:4px; border-radius:0; }
  .bb-bubbles span{ display:block; border-radius:50%; background:var(--navy); }
  .bb-bubbles span:nth-child(1){ width:12px; height:12px; background:#632B82; }
  .bb-bubbles span:nth-child(2){ width:18px; height:18px; background:#29489A; }
  .bb-bubbles span:nth-child(3){ width:10px; height:10px; background:#C9611F; }
  .bb-overlay{ flex-direction:column; justify-content:space-between; padding:40px 20px 30px; }
  .bb-stage{ text-align:center; color:#fff; width:100%; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
  .bb-stage h2{ font-size:24px; }
  .bb-stage p{ color:#C9D3E8; font-size:16px; margin:0; }
  .breathe-circle.bb-big{ width:160px; height:160px; margin:0; }
  .bb-bubblestage{ justify-content:flex-start; padding-top:10px; }
  .bubble-field{ position:relative; width:100%; flex:1; overflow:hidden; }
  .bubble{
    position:absolute; bottom:-90px; border-radius:50%; opacity:0.9;
    animation-name:bubbleRise; animation-timing-function:linear; animation-iteration-count:infinite;
    border:3px solid rgba(255,255,255,0.35);
  }
  .bubble.popped{ animation:bubblePop 0.2s ease forwards; }
  @keyframes bubbleRise{ 0%{ transform:translateY(0); } 100%{ transform:translateY(-110vh); } }
  @keyframes bubblePop{ 0%{ transform:scale(1); opacity:0.9; } 100%{ transform:scale(1.6); opacity:0; } }
  @media (prefers-reduced-motion: reduce){
    .bubble{ animation:none; bottom:auto; top:calc(10% + var(--i, 0) * 8%); }
    .bb-breathe{ animation:none; }
  }
  .bb-footer{ width:100%; display:flex; flex-direction:column; align-items:center; gap:12px; }
  .bb-timer{ width:80%; max-width:400px; height:8px; border-radius:999px; background:rgba(255,255,255,0.2); overflow:hidden; }
  .bb-timer-fill{ height:100%; width:100%; background:#F6E758; border-radius:999px; }
  .confetti-field{ position:absolute; inset:0; z-index:1; pointer-events:none; }
  .confetti-piece{
    position:absolute; top:-20px; width:9px; height:14px; border-radius:2px;
    animation-name:confettiFall; animation-timing-function:ease-in; animation-fill-mode:forwards;
  }
  @keyframes confettiFall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(110vh) rotate(360deg); opacity:0.9; }
  }
  @media (prefers-reduced-motion: reduce){
    .confetti-piece{ display:none; }
    .celebrate-card{ animation:none; }
  }
</style>

/* ---------------------------------------------------------
   STORAGE — self-healing layer
   Memory is the source of truth during a session. Storage is
   a best-effort sync target. If storage starts failing, the
   app switches to memory mode with ONE notice, queues every
   write, and silently retries in the background. If storage
   recovers, queued writes flush and everything persists.
--------------------------------------------------------- */
// Storage backend detection:
//   'claude'  - running inside Claude (shared storage across users)
//   'local'   - running standalone (e.g. on an iPad); data lives on this device
//   'memory'  - nothing available; session-only
const LS_PREFIX = 'ftsPassport:';
function detectBackend(){
  if(SHEET_ENABLED) return 'sheet';
  if(typeof window.storage !== 'undefined') return 'claude';
  try{
    const t = LS_PREFIX + '__test';
    localStorage.setItem(t, '1');
    localStorage.removeItem(t);
    return 'local';
  }catch(e){ return 'memory'; }
}
const STORAGE_BACKEND = detectBackend();
const hasStorage = STORAGE_BACKEND === 'claude';
let MEMORY_FALLBACK = {};
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* Google Sheet sync via Apps Script Web App.
   The Sheet is the shared source of truth across iPads; a localStorage
   mirror is kept so the app is instant and works offline. Writes are sent
   "fire and forget" (no-cors) because Apps Script can't return CORS headers;
   reads use a JSONP-style callback which Apps Script CAN serve. */

async function sheetRequest(params){
  // GET request via <script> tag (JSONP) — works around Apps Script CORS limits
  return new Promise((resolve) => {
    const cb = 'ftsCb_' + Math.random().toString(36).slice(2);
    const timer = setTimeout(() => { cleanup(); resolve(null); }, 8000);
    function cleanup(){ clearTimeout(timer); delete window[cb]; if(s.parentNode) s.parentNode.removeChild(s); }
    window[cb] = (data) => { cleanup(); resolve(data); };
    const qs = Object.entries(params).map(([k,v]) => encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
    const s = document.createElement('script');
    s.src = SHEET_SYNC_URL + '?callback=' + cb + '&' + qs;
    s.onerror = () => { cleanup(); resolve(null); };
    document.head.appendChild(s);
  });
}

async function sheetGet(key){
  const res = await sheetRequest({ action:'get', key });
  if(res && res.ok && res.value !== undefined && res.value !== null){
    localSet(key, res.value);
    return res.value;
  }
  return localGet(key); // fall back to local mirror if offline/unavailable
}

async function sheetSet(key, value){
  localSet(key, value); // instant + offline-safe
  try{
    // Fire-and-forget POST; body carries key + JSON payload
    await fetch(SHEET_SYNC_URL, {
      method:'POST', mode:'no-cors',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify({ action:'set', key, value })
    });
  }catch(e){ /* stays in local mirror; resyncs on next successful write */ }
  return true;
}

async function sheetDelete(key){
  localDelete(key);
  try{
    await fetch(SHEET_SYNC_URL, {
      method:'POST', mode:'no-cors',
      headers:{ 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify({ action:'delete', key })
    });
  }catch(e){}
  return true;
}

function localGet(key){
  try{ const v = localStorage.getItem(LS_PREFIX + key); return v === null ? null : JSON.parse(v); }
  catch(e){ return null; }
}
function localSet(key, value){
  try{ localStorage.setItem(LS_PREFIX + key, JSON.stringify(value)); return true; }
  catch(e){
    showToast('This iPad\u2019s storage is full. Ask a teacher to remove old passports or photos.');
    return false;
  }
}
function localDelete(key){
  try{ localStorage.removeItem(LS_PREFIX + key); }catch(e){}
}

const FETCH_FAILED = Symbol('fetch-failed');
let storageDegraded = false;      // circuit breaker: true after repeated failures
let degradedNoticeShown = false;  // the notice appears at most once per session
let consecutiveFailures = 0;
const PENDING_WRITES = new Map(); // key -> latest value awaiting sync

function enterDegradedMode(){
  storageDegraded = true;
  if(!degradedNoticeShown){
    degradedNoticeShown = true;
    showToast('Working in session mode \u2014 everything works normally for this visit. We\u2019ll keep trying to save in the background.');
  }
}

async function rawGet(key){
  const res = await window.storage.get(key, true);
  return res ? JSON.parse(res.value) : null;
}

async function getData(key){
  // Memory always wins if we have it — it's the most recent state
  if(key in MEMORY_FALLBACK) return MEMORY_FALLBACK[key];
  if(STORAGE_BACKEND === 'sheet'){
    const v = await sheetGet(key);
    if(v !== null && v !== undefined) MEMORY_FALLBACK[key] = v;
    return (v === undefined) ? null : v;
  }
  if(STORAGE_BACKEND === 'local'){
    const v = localGet(key);
    if(v !== null) MEMORY_FALLBACK[key] = v;
    return v;
  }
  if(!hasStorage) return null;
  const attempts = storageDegraded ? 1 : 2;
  for(let attempt=0; attempt<attempts; attempt++){
    try{
      const val = await rawGet(key);
      if(val !== null) MEMORY_FALLBACK[key] = val;
      consecutiveFailures = 0;
      return val;
    }catch(e){
      if(attempt === attempts-1){
        consecutiveFailures++;
        if(consecutiveFailures >= 2) enterDegradedMode();
        return FETCH_FAILED;
      }
      await sleep(300);
    }
  }
}

async function setData(key, value){
  MEMORY_FALLBACK[key] = value; // memory first: the app is always correct in-session
  if(STORAGE_BACKEND === 'sheet'){ await sheetSet(key, value); return true; }
  if(STORAGE_BACKEND === 'local'){ localSet(key, value); return true; }
  if(!hasStorage) return true;
  if(storageDegraded){
    PENDING_WRITES.set(key, value); // queue silently; background loop will flush
    return true;
  }
  try{
    await window.storage.set(key, JSON.stringify(value), true);
    consecutiveFailures = 0;
    return true;
  }catch(e){
    consecutiveFailures++;
    PENDING_WRITES.set(key, value);
    if(consecutiveFailures >= 2) enterDegradedMode();
    return true; // the session itself is fine either way
  }
}

// Background sync: every 20s, try to flush queued writes. On success, quietly recover.
if(hasStorage){
  setInterval(async ()=>{
    if(PENDING_WRITES.size === 0) return;
    const entries = Array.from(PENDING_WRITES.entries());
    for(const [key, value] of entries){
      try{
        await window.storage.set(key, JSON.stringify(value), true);
        PENDING_WRITES.delete(key);
      }catch(e){
        return; // storage still down; try again next cycle, silently
      }
    }
    if(PENDING_WRITES.size === 0 && storageDegraded){
      storageDegraded = false; // recovered — future writes go straight through
      consecutiveFailures = 0;
    }
  }, 20000);
}

async function deleteData(key){
  delete MEMORY_FALLBACK[key];
  PENDING_WRITES.delete(key);
  if(STORAGE_BACKEND === 'sheet'){ await sheetDelete(key); return true; }
  if(STORAGE_BACKEND === 'local'){ localDelete(key); return true; }
  if(!hasStorage) return true;
  try{ await window.storage.delete(key, true); return true; }
  catch(e){ return false; }
}

window.addEventListener('unhandledrejection', function(e){ e.preventDefault(); });

let lastToastTime = 0;
function showToast(msg){
  const now = Date.now();
  if(now - lastToastTime < 15000) return;
  lastToastTime = now;
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=>{ t.style.display = 'none'; }, 6000);
}

let ROSTER = [];
let STUDENT_CACHE = {};
let STRANDS = [];
let TEACHER_UNLOCKED = false;
let strandsLoadedOnce = false;

async function loadStrands(){
  if(strandsLoadedOnce) return; // fetch once per session; teacher edits update STRANDS in memory directly
  strandsLoadedOnce = true;
  const s = await getData('strands');
  if(s === FETCH_FAILED){ STRANDS = DEFAULT_STRANDS; return; } // use defaults locally, don't attempt a write
  if(!s){ STRANDS = DEFAULT_STRANDS; await setData('strands', STRANDS); }
  else{ STRANDS = s; }
}
async function saveStrands(){ await setData('strands', STRANDS); }
function strandById(id){ return STRANDS.find(s=>s.id===id); }
function activeStrands(){ return STRANDS.filter(s=>!s.archived); }

async function loadRoster(){
  const r = await getData('roster');
  if(r === FETCH_FAILED) return; // keep whatever ROSTER already holds rather than blanking the list
  ROSTER = r || [];
}
async function saveRoster(){ await setData('roster', ROSTER); }

async function getStudent(id){
  if(STUDENT_CACHE[id]) return STUDENT_CACHE[id];
  const rec = await getData('student:'+id);
  const student = (rec && rec !== FETCH_FAILED) ? rec : { id, name:'', group:'', color:AVATAR_COLORS[0], techs:[], progress:{}, visits:[], lastReadyCheck:'' };
  // Normalize records saved by earlier versions so no view ever crashes on missing fields
  if(!Array.isArray(student.techs)) student.techs = [];
  if(!Array.isArray(student.visits)) student.visits = [];
  if(!student.progress || typeof student.progress !== 'object') student.progress = {};
  if(student.lastReadyCheck === undefined) student.lastReadyCheck = '';
  if(!student.color) student.color = AVATAR_COLORS[0];
  STUDENT_CACHE[id] = student;
  return student;
}
async function saveStudent(student){
  STUDENT_CACHE[student.id] = student;
  await setData('student:'+student.id, student);
  const idx = ROSTER.findIndex(r=>r.id===student.id);
  const summary = { id:student.id, name:student.name, group:student.group||'', color:student.color };
  const unchanged = idx>=0 && ROSTER[idx].name===summary.name && ROSTER[idx].group===summary.group && ROSTER[idx].color===summary.color;
  if(unchanged) return;
  if(idx>=0) ROSTER[idx]=summary; else ROSTER.push(summary);
  await saveRoster();
}

function initials(name){ return (name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function prettyDate(iso){ return new Date(iso+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'long',year:'numeric'}); }
function isDone(p,key){ return p && p[key]==='done'; }
function strandComplete(student, strandId){
  const p = student.progress[strandId];
  if(!p) return false;
  return ['i1','i2','i3'].every(k => p[k] === 'done');
}
function stampCount(student, strandId){
  const p = student.progress[strandId];
  if(!p) return 0;
  return ['i1','i2','i3'].filter(k=>p[k]==='done').length;
}
function ensureProgress(student, strandId){
  if(!student.progress[strandId]) student.progress[strandId] = { i1:'not', i2:'not', i3:'not', stretch:false, everSupported:false, strength:null, feeling:null };
}
function completedCount(student){ return student.techs.filter(t=>strandComplete(student,t.id)).length; }

function assignStrength(p){
  if(p.everSupported) return 'Incredible';
  if(p.stretch) return 'Creative';
  return 'Amazing';
}
// Translate any strengths stored under the old naming
const LEGACY_STRENGTHS = { 'Persistence':'Incredible', 'Curiosity':'Creative', 'Focus':'Amazing' };
function displayStrength(s){ return LEGACY_STRENGTHS[s] || s; }

function displayName(student){
  const dupes = ROSTER.filter(r => r.name.trim().toLowerCase() === student.name.trim().toLowerCase());
  if(dupes.length <= 1) return student.name;
  if(student.group) return `${student.name} (${student.group})`;
  const idx = dupes.findIndex(d=>d.id===student.id) + 1;
  return `${student.name} #${idx}`;
}

function escapeHtml(str){ const div = document.createElement('div'); div.textContent = str || ''; return div.innerHTML; }

function displayNameFromSummary(s){
  const dupes = ROSTER.filter(r => r.name.trim().toLowerCase() === s.name.trim().toLowerCase());
  if(dupes.length <= 1) return s.name;
  if(s.group) return `${s.name} (${s.group})`;
  const idx = dupes.findIndex(d=>d.id===s.id) + 1;
  return `${s.name} #${idx}`;
}

/* ---------------------------------------------------------
   BRAIN BREAKS - short, self-ending, gently limited
--------------------------------------------------------- */
const BRAIN_BREAK_SECONDS = 45;
const BRAIN_BREAKS_PER_DAY = 3;

async function startBrainBreak(studentId, kind){
  const student = await getStudent(studentId);
  const today = todayStr();
  if(!student.brainBreaks || student.brainBreaks.date !== today){
    student.brainBreaks = { date: today, count: 0 };
  }
  if(student.brainBreaks.count >= BRAIN_BREAKS_PER_DAY){
    showNotice('You\u2019ve had your brain breaks for today. Time to get back to making things \u2014 you\u2019ve got this.');
    return;
  }
  student.brainBreaks.count++;
  await saveStudent(student);

  const overlay = document.createElement('div');
  overlay.className = 'celebrate-overlay bb-overlay';
  let inner = '';
  if(kind === 'breathe'){
    inner = `
      <div class="bb-stage">
        <div class="breathe-circle bb-big"></div>
        <h2>Breathe with the circle</h2>
        <p>In as it grows\u2026 out as it shrinks.</p>
      </div>`;
  } else {
    let bubbles = '';
    for(let i=0;i<14;i++){
      const left = 5 + Math.round(Math.random()*85);
      const size = 40 + Math.round(Math.random()*45);
      const delay = (Math.random()*6).toFixed(1);
      const dur = (7 + Math.random()*6).toFixed(1);
      const colors = ['#632B82','#29489A','#9C2B6D','#0A6077','#C9611F','#1F7C72'];
      const c = colors[i % colors.length];
      bubbles += `<button class="bubble" style="left:${left}%; width:${size}px; height:${size}px; background:${c}; animation-delay:${delay}s; animation-duration:${dur}s;" onclick="popBubble(this)" aria-label="Pop a bubble"></button>`;
    }
    inner = `
      <div class="bb-stage bb-bubblestage">
        <h2>Pop the bubbles</h2>
        <div class="bubble-field">${bubbles}</div>
      </div>`;
  }
  overlay.innerHTML = `
    ${inner}
    <div class="bb-footer">
      <div class="bb-timer"><div class="bb-timer-fill" id="bbTimerFill"></div></div>
      <button class="staffbtn" style="background:rgba(255,255,255,0.15); color:#fff;" onclick="endBrainBreak()">I\u2019m done</button>
    </div>`;
  document.body.appendChild(overlay);
  window._bbOverlay = overlay;

  const fill = overlay.querySelector('#bbTimerFill');
  requestAnimationFrame(()=>{ fill.style.transition = 'width ' + BRAIN_BREAK_SECONDS + 's linear'; fill.style.width = '0%'; });
  window._bbTimer = setTimeout(endBrainBreak, BRAIN_BREAK_SECONDS * 1000);
}

const BUBBLE_COLORS = ['#632B82','#29489A','#9C2B6D','#0A6077','#C9611F','#1F7C72'];
function popBubble(el){
  if(el.classList.contains('popped')) return; // ignore double-taps mid-pop
  el.classList.add('popped');
  setTimeout(()=>{
    if(!el.isConnected) return;
    // Respawn: new position, size, colour, and speed, rising from the bottom again
    el.classList.remove('popped');
    el.style.left = (5 + Math.round(Math.random()*85)) + '%';
    const size = 40 + Math.round(Math.random()*45);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.background = BUBBLE_COLORS[Math.floor(Math.random()*BUBBLE_COLORS.length)];
    el.style.animation = 'none';
    void el.offsetWidth; // force reflow so the rise animation restarts from the bottom
    el.style.animation = '';
    el.style.animationName = 'bubbleRise';
    el.style.animationTimingFunction = 'linear';
    el.style.animationIterationCount = 'infinite';
    el.style.animationDuration = (6 + Math.random()*5).toFixed(1) + 's';
    el.style.animationDelay = '0s';
  }, 240);
}

function endBrainBreak(){
  clearTimeout(window._bbTimer);
  const overlay = window._bbOverlay;
  if(!overlay || !overlay.isConnected) return;
  overlay.innerHTML = `
    <div class="celebrate-card">
      <h2>Nice reset.</h2>
      <p>Ready to get back to it?</p>
      <button class="bigbtn" style="background:var(--navy); color:#fff; box-shadow:0 8px 0 #431C5A;" onclick="closeBrainBreak()">Back to my passport</button>
    </div>`;
  window._bbCloseTimer = setTimeout(closeBrainBreak, 8000);
}

function closeBrainBreak(){
  clearTimeout(window._bbTimer);
  clearTimeout(window._bbCloseTimer);
  if(window._bbOverlay && window._bbOverlay.isConnected) window._bbOverlay.remove();
  window._bbOverlay = null;
}

async function cycleIndicator(studentId, strandId, key){
  const student = await getStudent(studentId);
  ensureProgress(student, strandId);
  const wasComplete = strandComplete(student, strandId);
  const order = ['not','supported','done'];
  const current = student.progress[strandId][key];
  const next = order[(order.indexOf(current)+1) % order.length];
  student.progress[strandId][key] = next;
  if(next === 'supported') student.progress[strandId].everSupported = true;
  const nowComplete = strandComplete(student, strandId);
  if(nowComplete && !wasComplete && !student.progress[strandId].strength){
    student.progress[strandId].strength = assignStrength(student.progress[strandId]);
  }
  await saveStudent(student);
  await render();
  const el = document.getElementById('stamp-'+key);
  if(el){ el.classList.add('pop'); }
  if(nowComplete && !wasComplete){
    const s = strandById(strandId);
    celebrate(studentId, strandId, s.name, s.color, student.progress[strandId].strength);
  }
}

function celebrate(studentId, strandId, strandName, color, strength){
  const overlay = document.createElement('div');
  overlay.className = 'celebrate-overlay';
  let confetti = '';
  for(let i=0;i<24;i++){
    const left = Math.round(Math.random()*100);
    const delay = (Math.random()*0.4).toFixed(2);
    const dur = (1.6 + Math.random()*0.8).toFixed(2);
    const hue = [color, '#F6E758', '#FFFFFF'][i % 3];
    confetti += `<span class="confetti-piece" style="left:${left}%; background:${hue}; animation-delay:${delay}s; animation-duration:${dur}s;"></span>`;
  }
  overlay.innerHTML = `
    <div class="confetti-field">${confetti}</div>
    <div class="celebrate-card">
      <div class="medal">${medalSVG()}</div>
      <h2>Nice work.</h2>
      <p>You\u2019ve finished <strong>${escapeHtml(strandName)}</strong>.</p>
      <div class="strength-tag" style="background:${color};">You were ${displayStrength(strength)}!</div>
      <div class="feeling-prompt">
        <div class="fp-label">How did that feel?</div>
        <div class="fp-row">
          <button class="fp-option" data-feeling="good" onclick="recordFeeling(this,'${studentId}','${strandId}','good')">${icon('faceGood')}</button>
          <button class="fp-option" data-feeling="okay" onclick="recordFeeling(this,'${studentId}','${strandId}','okay')">${icon('faceOkay')}</button>
          <button class="fp-option" data-feeling="tricky" onclick="recordFeeling(this,'${studentId}','${strandId}','tricky')">${icon('faceTricky')}</button>
        </div>
      </div>
      <button class="photo-cta" onclick="this.closest('.celebrate-overlay').remove(); capturePhoto('${studentId}','${strandId}')">${icon('camera')} Take a photo of what you made</button>
      <button class="bigbtn" style="background:${color};color:#fff;box-shadow:0 8px 0 rgba(0,0,0,0.2);" onclick="this.closest('.celebrate-overlay').remove()">Keep going</button>
    </div>

function capturePhoto(studentId, strandId){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.capture = 'environment';
  input.onchange = async () => {
    const file = input.files && input.files[0];
    if(!file) return;
    const dataUrl = await downscaleImage(file, 520, 0.72);
    if(!dataUrl){ showToast('That photo couldn\u2019t be read. Please try again.'); return; }
    const student = await getStudent(studentId);
    ensureProgress(student, strandId);
    student.progress[strandId].photo = dataUrl;
    await saveStudent(student);
    await render();
  };
  input.click();
}

function downscaleImage(file, maxSize, quality){
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => resolve(null);
      img.src = reader.result;
    };
    reader.onerror = () => resolve(null);
    reader.readAsDataURL(file);
  });
}

async function removePhoto(studentId, strandId){

async function downloadCertificate(studentId){
  const student = await getStudent(studentId);
  const completed = student.techs.filter(t=>strandComplete(student,t.id));
  const W = 1000, rowH = 190;
  const H = 470 + completed.length * rowH + 90;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background + brand border
  ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = '#632B82'; ctx.lineWidth = 14; ctx.strokeRect(7,7,W-14,H-14);

  const loadImg = (src) => new Promise(res => { const im = new Image(); im.onload = ()=>res(im); im.onerror = ()=>res(null); im.src = src; });

  // Logo
  const logo = await loadImg(LOGO_SRC);
  if(logo){
    const lw = 240, lh = lw * (logo.height/logo.width);
    ctx.drawImage(logo, (W-lw)/2, 46, lw, lh);
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#6E5F7C';
  ctx.font = '600 26px Arial';
  ctx.fillText('STEAM Passport \u2014 Achievements', W/2, 260);

  ctx.fillStyle = '#632B82';
  ctx.font = 'bold 54px Arial';
  ctx.fillText(student.name, W/2, 330);

  ctx.fillStyle = '#6E5F7C';
  ctx.font = '22px Arial';
  ctx.fillText('has learned the foundations of', W/2, 375);

  let y = 420;
  for(const t of completed){
    const s = strandById(t.id);
    if(!s) continue;
    const pr = student.progress[t.id] || {};
    // Colour chip
    ctx.fillStyle = s.color;
    roundRect(ctx, 90, y, 14, rowH-40, 7); ctx.fill();
    // Photo if present
    if(pr.photo){
      const ph = await loadImg(pr.photo);
      if(ph){
        const phH = rowH-40, phW = phH * (ph.width/ph.height);
        ctx.save();
        roundRect(ctx, 130, y, Math.min(phW, 260), phH, 12); ctx.clip();
        ctx.drawImage(ph, 130, y, Math.min(phW, 260), phH);
        ctx.restore();
      }
    }
    ctx.textAlign = 'left';
    ctx.fillStyle = '#3A2E45';
    ctx.font = 'bold 34px Arial';
    ctx.fillText(s.name, 420, y + 55);
    if(pr.strength){
      ctx.fillStyle = '#632B82';
      ctx.font = '600 24px Arial';
      ctx.fillText('You were ' + displayStrength(pr.strength) + '!', 420, y + 100);
    }
    y += rowH;
  }

  ctx.textAlign = 'center';
  ctx.fillStyle = '#6E5F7C';
  ctx.font = '20px Arial';
  ctx.fillText(new Date().toLocaleDateString('en-AU', { day:'numeric', month:'long', year:'numeric' }), W/2, H - 45);

  const link = document.createElement('a');
  link.download = (student.name || 'student').replace(/\s+/g,'_') + '_STEAM_Passport_Certificate.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

let READ_ALOUD = false;

function speak(text){
  if(!('speechSynthesis' in window) || !text) return;
  try{
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text.trim());
    u.rate = 0.92; u.pitch = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v=>/en-AU/i.test(v.lang)) || voices.find(v=>/en-GB/i.test(v.lang)) || voices.find(v=>/^en/i.test(v.lang));
    if(preferred) u.voice = preferred;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function toggleReadAloud(){
  READ_ALOUD = !READ_ALOUD;
  if(!READ_ALOUD && 'speechSynthesis' in window) window.speechSynthesis.cancel();
  const btn = document.getElementById('readAloudBtn');
  if(btn){
    btn.classList.toggle('on', READ_ALOUD);
    btn.setAttribute('aria-pressed', READ_ALOUD ? 'true' : 'false');
  }
  if(READ_ALOUD) speak('Read aloud is on. Tap anything to hear it.');
}

// When read-aloud is on, tapping any text element reads it.
document.addEventListener('click', function(e){
  if(!READ_ALOUD) return;
  const el = e.target.closest('button, .team-card, .story-step, .strandcard, .indicator-card, h1, h2, h3, p, .studenttile, .techtile, .scale-dot');
  if(!el) return;
  if(el.id === 'readAloudBtn') return; // don't read the toggle itself
  const text = (el.getAttribute('aria-label') || el.innerText || el.textContent || '').replace(/\s+/g,' ').trim();
  if(text) speak(text);
}, true);

// Floating speaker button, always available, injected once and kept across re-renders.
function ensureReadAloudButton(){
  if(document.getElementById('readAloudBtn')) return;
  const btn = document.createElement('button');
  btn.id = 'readAloudBtn';
  btn.className = 'read-aloud-btn';
  btn.setAttribute('aria-label', 'Turn read aloud on or off');
  btn.setAttribute('aria-pressed', 'false');
  btn.onclick = toggleReadAloud;
  btn.innerHTML = `${icon('speaker')}<span>Hear</span>`;
  document.body.appendChild(btn);
}

// Prime voices (some browsers load them asynchronously)
if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

(async () => {
  await render();
  ensureReadAloudButton();
})();
</script>
</body>
